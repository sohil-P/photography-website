<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Digital Studio</title>
    <link
      rel="shortcut icon"
      href="Images/AI-digital-logo.jpeg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./videography.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./aos.css" />
  </head>
  <body>
    <div id="loader">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div id="main-content" style="display: none">
      <!-- Navbar -->
      <nav class="navbar" data-aos="fade-down" data-aos-duration="1000">
        <div class="navbar-container">
          <div class="logo">
            <a href="./index.html"
              ><img src="Images/AI-digital-logo.jpeg" alt="Logo"
            /></a>
          </div>
          <ul class="nav-links" id="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#portfolio">Portfolio</a></li>
            <li><a href="#pricing">Pricing</a></li>
            <li><a href="#contact">Contact</a></li>
          </ul>
          <div class="hamburger" id="hamburger">
            <i class="fas fa-bars"></i>
          </div>
        </div>
      </nav>

      <!-- Hero Section -->
      <section class="hero">
        <div class="video-container">
          <video
            src="Images/videography-video.mp4"
            type="video/mp4"
            autoplay
            loop
            muted
            playsinline
            preload="auto"
          ></video>
          <div class="overlay"></div>

          <div class="hero-content">
            <h1 id="video-heading"></h1>
            <p>Capturing moments, creating memories.</p>
            <div class="box-container">
              <div class="box-one box">
                <a href="#reels-making"
                  ><i class="fa-brands fa-instagram"></i
                ></a>
                <a href="#reels-making"><p>Reels Making</p></a>
              </div>
              <div class="box-two box">
                <p>Wedding Videography</p>
              </div>
              <div class="box-three box">
                <p>Event Videography</p>
              </div>
              <div class="box-four box">
                <p>Pre-Wedding Shooting</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="reels-making" id="reels-making">
        <div class="reels-title">
          <h2>Reels Making</h2>
        </div>
        <div class="reels-container">
          <div class="grid">
            <div class="reel-box">
              <video class="myVideo" loop playsinline>
                <source src="Images/reel-1.mp4" type="video/mp4" />
              </video>
            </div>
            <div class="reel-box">
              <video class="myVideo" muted loop playsinline>
                <source src="Images/reel-2.mp4" type="video/mp4" />
              </video>
            </div>
            <div class="reel-box">
              <video class="myVideo" muted loop playsinline>
                <source src="Images/reel-3.mp4" type="video/mp4" />
              </video>
            </div>
            <div class="reel-box">
              <video class="myVideo" muted loop playsinline>
                <source src="Images/reel-4.mp4" type="video/mp4" />
              </video>
            </div>
            <div class="reel-box">
              <video class="myVideo" muted loop playsinline>
                <source src="Images/reel-4.mp4" type="video/mp4" />
              </video>
            </div>
            <div class="reel-box">
              <video class="myVideo" muted loop playsinline>
                <source src="Images/reel-2.mp4" type="video/mp4" />
              </video>
            </div>
            <div class="reel-box">
              <video class="myVideo" muted loop playsinline>
                <source src="Images/reel-1.mp4" type="video/mp4" />
              </video>
            </div>
            <div class="reel-box">
              <video class="myVideo" muted loop playsinline>
                <source src="Images/reel-3.mp4" type="video/mp4" />
              </video>
            </div>
          </div>

          <div class="video-modal" id="videoModal">
            <span class="close-btn" onclick="closeModal()">&#x2715;</span>
            <video id="modalVideo" controls autoplay></video>
          </div>
        </div>
      </section>
    </div>

    <script src="./aos.js"></script>
    <script src="./script.js"></script>
    <script src="./videography.js"></script>
  </body>
</html>
