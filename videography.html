<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Digital Studio</title>
    <link
      rel="shortcut icon"
      href="Images/AI-digital-logo.jpeg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./videography.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./aos.css" />
  </head>
  <body>
    <div id="loader">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div id="main-content" style="display: none">
      <!-- Navbar -->
      <nav class="navbar" data-aos="fade-down" data-aos-duration="1000">
        <div class="navbar-container">
          <div class="logo">
            <a href="./index.html"
              ><img src="Images/AI-digital-logo.jpeg" alt="Logo"
            /></a>
          </div>
          <ul class="nav-links" id="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#portfolio">Portfolio</a></li>
            <li><a href="#pricing">Pricing</a></li>
            <li><a href="#contact">Contact</a></li>
          </ul>
          <div class="hamburger" id="hamburger">
            <i class="fas fa-bars"></i>
          </div>
        </div>
      </nav>

      <!-- Hero Section -->
      <section class="hero">
        <div class="video-container">
          <video
            src="Images/videography-video.mp4"
            type="video/mp4"
            autoplay
            loop
            muted
            playsinline
            preload="auto"
          ></video>
          <div class="overlay"></div>

          <div class="hero-content">
            <h1 id="video-heading"></h1>
            <p>Capturing moments, creating memories.</p>
            <div class="box-container">
              <div class="box-one box">
                <i class="fa-brands fa-instagram"></i>
                <p>Reels Making</p>
              </div>
              <div class="box-two box">
                <p>Wedding Videography</p>
              </div>
              <div class="box-three box">
                <p>Event Videography</p>
              </div>
              <div class="box-four box">
                <p>Pre-Wedding Shooting</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script src="./aos.js"></script>
    <script src="./script.js"></script>

    <script>
      const text = "Videography - AI Digital Studio!";
      let i = 0;
      let isDeleting = false;
      const speed = 100;
      const delay = 1500; // Delay before restart

      function typeWriterLoop() {
        const heading = document.getElementById("video-heading");

        if (!isDeleting) {
          heading.innerHTML = text.substring(0, i + 1);
          i++;
          if (i === text.length) {
            isDeleting = true;
            setTimeout(typeWriterLoop, delay); // wait before deleting
            return;
          }
        } else {
          heading.innerHTML = text.substring(0, i - 1);
          i--;
          if (i === 0) {
            isDeleting = false;
          }
        }

        setTimeout(typeWriterLoop, speed);
      }

      window.addEventListener("DOMContentLoaded", typeWriterLoop);
    </script>
  </body>
</html>
